<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DSA Nexus — Learn Data Structures & Algorithms</title>
<meta name="description" content="Learn Data Structures & Algorithms from basic to advanced, with visual diagrams and a live JavaScript compiler." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
<script>
  // Applied synchronously, before first paint, to avoid a flash of the wrong theme.
  try {
    var t = localStorage.getItem("dsa-nexus:theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) { /* localStorage unavailable — default dark stays */ }
</script>
</head>
<body>
<div class="bubble-field"><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span></div>

<header class="topbar">
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <a href="#/" class="brand">
    <span class="brand-mark">&lt;/&gt;</span>
    <span class="brand-name">DSA <em>Nexus</em></span>
  </a>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search topics… e.g. binary search, heap, DP" autocomplete="off" />
    <div id="searchResults" class="search-results hidden"></div>
  </div>
  <a href="#/bookmarks" class="topbar-link" id="bookmarksLink" title="Saved topics">★ Saved</a>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Cycle theme: dark, aurora, light" title="Cycle theme">
    <span class="theme-icon-dark">🌙</span>
    <span class="theme-icon-aurora">🫧</span>
    <span class="theme-icon-light">☀️</span>
  </button>
  <div id="authArea" class="auth-area"><!-- populated by app.js: Sign In button OR avatar --></div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-scroll">
      <div class="sidebar-primary-nav">
        <a href="#/" class="spn-link">🏠 Home</a>
        <a href="#/problems" class="spn-link">🧩 Problems</a>
        <a href="#/terminal" class="spn-link">⌨️ Terminal</a>
        <a href="#/dashboard" class="spn-link">📊 Dashboard</a>
        <a href="#/feedback" class="spn-link">💬 Feedback</a>
      </div>
      <div class="sidebar-divider"></div>
      <div id="sidebarContent">
        <!-- populated by app.js -->
      </div>
    </div>
  </nav>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="content" id="content">
    <!-- populated by app.js -->
  </main>
</div>

<!-- Auth modal: sign in / sign up, shared across the app -->
<div class="modal-backdrop hidden" id="authModalBackdrop">
  <div class="modal auth-modal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
    <button class="modal-close" id="authModalClose" aria-label="Close">✕</button>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" type="button">Sign In</button>
      <button class="auth-tab" data-tab="register" type="button">Create Account</button>
    </div>
    <h2 id="authModalTitle" class="auth-modal-title">Welcome back</h2>
    <div id="googleSignInHost" class="google-signin-host"></div>
    <div class="auth-divider"><span>or</span></div>
    <form id="authForm" class="auth-form">
      <div class="form-row" id="nameRow" style="display:none;">
        <label for="authName">Name</label>
        <input id="authName" type="text" autocomplete="name" placeholder="Ada Lovelace" />
      </div>
      <div class="form-row">
        <label for="authEmail">Email</label>
        <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="form-row">
        <label for="authPassword">Password</label>
        <input id="authPassword" type="password" autocomplete="current-password" placeholder="••••••••" required minlength="8" />
      </div>
      <div class="auth-error hidden" id="authError"></div>
      <button type="submit" class="btn btn-primary auth-submit" id="authSubmitBtn">Sign In</button>
    </form>
  </div>
</div>

<footer class="site-footer">
  <p>DSA Nexus — built with Node.js, Express, HTML, CSS &amp; vanilla JS. Diagrams are original SVGs, not sourced from third parties.</p>
</footer>

<script src="/js/progress.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/highlight.js"></script>
<script src="/js/background.js"></script>
<script src="/js/diagrams.js"></script>
<script src="/js/compiler.js"></script>
<script src="/js/terminal.js"></script>
<script src="/js/slides.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
